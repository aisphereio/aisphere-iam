version: v2
modules:
  - path: api
lint:
  use:
    - STANDARD
  except:
    # Existing IAM APIs intentionally reuse domain models such as User,
    # Organization, Project, Resource, and google.protobuf.Empty across RPCs.
    # Keeping this style avoids a large API-breaking wrapper-message rewrite.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - ENUM_VALUE_PREFIX
    - PACKAGE_VERSION_SUFFIX
    - DIRECTORY_SAME_PACKAGE
    - ENUM_NO_ALLOW_ALIAS
deps:
  - buf.build/googleapis/googleapis
  - buf.build/grpc-ecosystem/grpc-gateway
  - buf.build/bufbuild/protovalidate
breaking:
  use:
    - FILE
