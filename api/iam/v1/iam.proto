syntax = "proto3";

package iam.v1;

import "aisphere/access/v1/access.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/aisphereio/aisphere-iam/api/iam/v1;v1";

service IAMAuthService {
  rpc BuildLoginURL(BuildLoginURLRequest) returns (BuildLoginURLReply) {
    option (google.api.http) = { get: "/v1/iam/login-url" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.login_url" risk: "low" }
      rate_limit: { enabled: true key: "ip" qps: 5 burst: 10 backend: MEMORY }
    };
  }

  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeReply) {
    option (google.api.http) = { post: "/v1/iam/auth/exchange" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.exchange_code" risk: "medium" }
      rate_limit: { enabled: true key: "ip" qps: 3 burst: 5 backend: MEMORY }
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (TokenSet) {
    option (google.api.http) = { post: "/v1/iam/auth/refresh" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "refresh" resource: "iam:session" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.refresh_token" risk: "medium" }
    };
  }

  rpc VerifyToken(VerifyTokenRequest) returns (Principal) {
    option (google.api.http) = { post: "/v1/iam/auth/verify" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "verify" resource: "iam:token" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.verify_token" risk: "medium" }
      reason: "Token verification is only callable by trusted platform services."
    };
  }

  rpc ExternalAuthorize(google.protobuf.Empty) returns (Principal) {
    option (google.api.http) = { post: "/internal/iam/ext-authz" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      gateway: { publish: DISABLED }
      audit: { enabled: true event: "iam.external_authorize" risk: "medium" }
      reason: "Gateway API / Envoy ExternalAuth endpoint. IAM validates the external bearer token and returns Gateway-controlled trusted identity headers."
    };
  }

  rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/iam/auth/revoke" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "revoke" resource: "iam:session" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.revoke_token" risk: "medium" }
    };
  }

  rpc GetMe(GetMeRequest) returns (GetMeReply) {
    option (google.api.http) = { get: "/v1/iam/me" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "read" resource: "iam:self" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.get_me" risk: "low" }
    };
  }

  rpc BuildLogoutURL(BuildLogoutURLRequest) returns (BuildLogoutURLReply) {
    option (google.api.http) = { get: "/v1/iam/logout-url" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.logout_url" risk: "low" }
      rate_limit: { enabled: true key: "ip" qps: 5 burst: 10 backend: MEMORY }
    };
  }
}

service IAMDirectoryService {
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users/{user_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:org:{org_id}:user:{user_id}" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.user.get" risk: "low" }
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:org:{org_id}:user:*" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.user.list" risk: "medium" }
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:org:{org_id}:organization:{org_id}" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.org.get" risk: "low" }
    };
  }

  rpc ListGroups(ListGroupsRequest) returns (ListGroupsReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/groups" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:org:{org_id}:group:*" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.group.list" risk: "medium" }
    };
  }
}

service IAMPermissionService {
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionReply) {
    option (google.api.http) = { post: "/v1/iam/permissions/check" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "check" resource: "iam:permission" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.permission.check" risk: "medium" }
      reason: "Permission decisions are exposed to platform services, not directly to external clients."
    };
  }

  rpc WriteRelationship(WriteRelationshipRequest) returns (WriteRelationshipReply) {
    option (google.api.http) = { post: "/v1/iam/relationships" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "write" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.relationship.write" risk: "high" }
    };
  }

  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipReply) {
    option (google.api.http) = { post: "/v1/iam/relationships/delete" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "delete" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.relationship.delete" risk: "high" }
    };
  }

  rpc LookupResources(LookupResourcesRequest) returns (LookupResourcesReply) {
    option (google.api.http) = { post: "/v1/iam/resources/lookup" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "lookup" resource: "iam:resource" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.resource.lookup" risk: "medium" }
      reason: "Authorization graph resource lookup is restricted to trusted backend services."
    };
  }

  rpc LookupSubjects(LookupSubjectsRequest) returns (LookupSubjectsReply) {
    option (google.api.http) = { post: "/v1/iam/subjects/lookup" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "lookup" resource: "iam:subject" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.subject.lookup" risk: "medium" }
      reason: "Authorization graph subject lookup is restricted to trusted backend services."
    };
  }
}

message BuildLoginURLRequest {
  string redirect_uri = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string state = 2;
  string scope = 3;
  string org_id = 4;
  string app_id = 5;
}

message BuildLoginURLReply {
  string login_url = 1;
  string provider = 2;
  string redirect_uri = 3;
  string state = 4;
  string scope = 5;
}

message ExchangeCodeRequest {
  string code = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string state = 2;
  string redirect_uri = 3;
  string org_id = 4;
  string app_id = 5;
}

message ExchangeCodeReply {
  TokenSet tokens = 1;
  Principal principal = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string scope = 2;
  string org_id = 3;
  string app_id = 4;
}

message VerifyTokenRequest {
  string token = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string token_type = 2;
  string org_id = 3;
  string app_id = 4;
}

message RevokeTokenRequest {
  string token = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string token_type = 2;
  string org_id = 3;
  string app_id = 4;
}

message GetMeRequest {
  bool include_profile = 1;
}

message GetMeReply {
  Principal principal = 1;
  User user = 2;
  repeated Group groups = 3;
  Application application = 4;
  repeated string warnings = 5;
}

message BuildLogoutURLRequest {
  string post_logout_redirect_uri = 1;
  string id_token_hint = 2;
  string state = 3;
  string org_id = 4;
  string app_id = 5;
}

message BuildLogoutURLReply {
  string logout_url = 1;
  string provider = 2;
  string post_logout_redirect_uri = 3;
  string state = 4;
}

message GetUserRequest {
  string org_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string user_id = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
}

message ListUsersRequest {
  string org_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string query = 2;
  string group_id = 3;
  string role = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListUsersReply {
  repeated User users = 1;
  string next_page_token = 2;
}

message GetOrganizationRequest {
  string org_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
}

message ListGroupsRequest {
  string org_id = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string parent_id = 2;
  string type = 3;
  string user_id = 4;
  bool include_inherited = 5;
}

message ListGroupsReply {
  repeated Group groups = 1;
}

message CheckPermissionRequest {
  SubjectRef subject = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
  ObjectRef resource = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
  string permission = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string org_id = 4;
  string project_id = 5;
}

message CheckPermissionReply {
  bool allowed = 1;
  string effect = 2;
  string reason = 3;
  string consistency_token = 4;
}

message WriteRelationshipRequest {
  Relationship relationship = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

message WriteRelationshipReply {
  int32 written = 1;
  string consistency_token = 2;
}

message DeleteRelationshipRequest {
  RelationshipFilter filter = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

message DeleteRelationshipReply {
  int32 deleted = 1;
  string consistency_token = 2;
}

message LookupResourcesRequest {
  SubjectRef subject = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
  string resource_type = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string permission = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  int32 limit = 4;
  string cursor = 5;
}

message LookupResourcesReply {
  repeated ObjectRef resources = 1;
  string next_cursor = 2;
  string consistency_token = 3;
}

message LookupSubjectsRequest {
  ObjectRef resource = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
  string permission = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  string subject_type = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];
  int32 limit = 4;
  string cursor = 5;
}

message LookupSubjectsReply {
  repeated SubjectRef subjects = 1;
  string next_cursor = 2;
  string consistency_token = 3;
}

message TokenSet {
  string access_token = 1;
  string refresh_token = 2;
  string id_token = 3;
  string token_type = 4;
  string scope = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message Principal {
  string subject_id = 1;
  string subject_type = 2;
  string provider = 3;
  string external_id = 4;
  string issuer = 5;
  repeated string audience = 6;
  string tenant_id = 7;
  string org_id = 8;
  string app_id = 9;
  string project_id = 10;
  string username = 11;
  string name = 12;
  string email = 13;
  string phone = 14;
  repeated string roles = 15;
  repeated string groups = 16;
  repeated string scopes = 17;
  string auth_method = 18;
  google.protobuf.Timestamp issued_at = 19;
  google.protobuf.Timestamp expires_at = 20;
}

message User {
  string id = 1;
  string external_id = 2;
  string provider = 3;
  string org_id = 4;
  string username = 5;
  string display_name = 6;
  string email = 7;
  string phone = 8;
  repeated string roles = 9;
  repeated string groups = 10;
  bool enabled = 11;
}

message Organization {
  string id = 1;
  string external_id = 2;
  string name = 3;
  string display_name = 4;
  string owner_id = 5;
  string parent_id = 6;
  repeated string tags = 7;
  bool enabled = 8;
}

message Group {
  string id = 1;
  string external_id = 2;
  string org_id = 3;
  string parent_id = 4;
  string name = 5;
  string display_name = 6;
  string type = 7;
  string path = 8;
  repeated string users = 9;
}

message Application {
  string id = 1;
  string external_id = 2;
  string org_id = 3;
  string name = 4;
  string display_name = 5;
  string client_id = 6;
  repeated string redirect_uris = 7;
  repeated string grant_types = 8;
  repeated string scopes = 9;
  repeated string providers = 10;
  bool enable_password = 11;
  bool enable_signup = 12;
}

message ObjectRef {
  string type = 1;
  string id = 2;
}

message SubjectRef {
  string type = 1;
  string id = 2;
  string relation = 3;
}

message Relationship {
  ObjectRef resource = 1;
  string relation = 2;
  SubjectRef subject = 3;
}

message RelationshipFilter {
  string resource_type = 1;
  string resource_id = 2;
  string relation = 3;
  string subject_type = 4;
  string subject_id = 5;
  string subject_relation = 6;
}
