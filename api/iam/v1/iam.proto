syntax = "proto3";

package iam.v1;

import "aisphere/access/v1/access.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/aisphereio/aisphere-iam/api/iam/v1;v1";

service IAMAuthService {
  rpc VerifyToken(VerifyTokenRequest) returns (Principal) {
    option (google.api.http) = { post: "/v1/iam/auth/verify" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "verify" resource: "iam:token" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.verify_token" risk: "medium" }
      reason: "Token verification is only callable by trusted platform services."
    };
  }

  rpc ExternalAuthorize(google.protobuf.Empty) returns (Principal) {
    option (google.api.http) = { post: "/internal/iam/ext-authz" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      gateway: { publish: DISABLED }
      audit: { enabled: true event: "iam.external_authorize" risk: "medium" }
      reason: "Gateway API / Envoy ExternalAuth endpoint. IAM validates the external bearer token and returns Gateway-controlled trusted identity headers."
    };
  }

  rpc GetMe(GetMeRequest) returns (GetMeReply) {
    option (google.api.http) = { get: "/v1/iam/me" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "read" resource: "iam:self" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.get_me" risk: "low" }
    };
  }
}

service IAMDirectoryService {
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users/{user_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:org:{org_id}:user:{user_id}" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.user.get" risk: "low" }
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:org:{org_id}:user:*" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.user.list" risk: "medium" }
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:org:{org_id}:organization:{org_id}" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.org.get" risk: "low" }
    };
  }

  rpc ListGroups(ListGroupsRequest) returns (ListGroupsReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/groups" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:org:{org_id}:group:*" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.group.list" risk: "medium" }
    };
  }

  rpc GetGroup(GetGroupRequest) returns (Group) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/groups/{group_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "group:{group_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.get" risk: "low" }
    };
  }

  rpc CreateGroup(CreateGroupRequest) returns (Group) {
    option (google.api.http) = { post: "/v1/iam/orgs/{org_id}/groups" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "create_groups" resource: "zone:{org_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.create" risk: "high" }
    };
  }

  rpc UpdateGroup(UpdateGroupRequest) returns (Group) {
    option (google.api.http) = { put: "/v1/iam/orgs/{org_id}/groups/{group_id}" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "group:{group_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.update" risk: "high" }
    };
  }

  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/iam/orgs/{org_id}/groups/{group_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "group:{group_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.delete" risk: "critical" }
    };
  }

  rpc AssignUserToGroup(AssignUserToGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/iam/directory/group-memberships:assign" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage_members" resource: "group:{group_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.member.assign" risk: "high" }
    };
  }

  rpc RemoveUserFromGroup(RemoveUserFromGroupRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/iam/directory/group-memberships:remove" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage_members" resource: "group:{group_id}" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.group.member.remove" risk: "high" }
    };
  }
}

service IAMDirectoryProjectionService {
  rpc RetryDirectoryProjection(RetryDirectoryProjectionRequest) returns (RetryDirectoryProjectionReply) {
    option (google.api.http) = { post: "/v1/iam/directory/projections:retry" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "repair_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.directory_projection.retry" risk: "high" }
    };
  }

  rpc ReconcileDirectoryProjection(ReconcileDirectoryProjectionRequest) returns (ReconcileDirectoryProjectionReply) {
    option (google.api.http) = { post: "/v1/iam/directory/projections:reconcile" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "repair_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.directory_projection.reconcile" risk: "critical" }
    };
  }

  rpc CheckDirectoryProjectionDrift(CheckDirectoryProjectionDriftRequest) returns (CheckDirectoryProjectionDriftReply) {
    option (google.api.http) = { post: "/v1/iam/directory/projections:drift" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.directory_projection.drift" risk: "medium" }
    };
  }
}

service IAMPermissionService {
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionReply) {
    option (google.api.http) = { post: "/v1/iam/permissions/check" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "check" resource: "iam:permission" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.permission.check" risk: "medium" }
      reason: "Permission decisions are exposed to platform services, not directly to external clients."
    };
  }

  rpc WriteRelationship(WriteRelationshipRequest) returns (WriteRelationshipReply) {
    option (google.api.http) = { post: "/v1/iam/relationships" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "write" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.relationship.write" risk: "high" }
    };
  }

  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipReply) {
    option (google.api.http) = { post: "/v1/iam/relationships/delete" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "delete" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.relationship.delete" risk: "high" }
    };
  }

  rpc LookupResources(LookupResourcesRequest) returns (LookupResourcesReply) {
    option (google.api.http) = { post: "/v1/iam/resources/lookup" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "lookup" resource: "iam:resource" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.resource.lookup" risk: "medium" }
      reason: "Authorization graph resource lookup is restricted to trusted backend services."
    };
  }

  rpc LookupSubjects(LookupSubjectsRequest) returns (LookupSubjectsReply) {
    option (google.api.http) = { post: "/v1/iam/subjects/lookup" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "lookup" resource: "iam:subject" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.subject.lookup" risk: "medium" }
      reason: "Authorization graph subject lookup is restricted to trusted backend services."
    };
  }
}

service IAMAuthorizationAdminService {
  rpc GetAuthorizationSchema(GetAuthorizationSchemaRequest) returns (AuthorizationSchema) {
    option (google.api.http) = { get: "/v1/iam/authz/schema" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_schema" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.schema.get" risk: "medium" }
    };
  }

  rpc ValidateAuthorizationSchema(ValidateAuthorizationSchemaRequest) returns (ValidateAuthorizationSchemaReply) {
    option (google.api.http) = { post: "/v1/iam/authz/schema:validate" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "publish_schema" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.schema.validate" risk: "high" }
    };
  }

  rpc PublishAuthorizationSchema(PublishAuthorizationSchemaRequest) returns (PublishAuthorizationSchemaReply) {
    option (google.api.http) = { post: "/v1/iam/authz/schema:publish" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "publish_schema" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.schema.publish" risk: "critical" }
    };
  }

  rpc ListRelationships(ListRelationshipsRequest) returns (ListRelationshipsReply) {
    option (google.api.http) = { get: "/v1/iam/authz/relationships" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.relationship.list" risk: "medium" }
    };
  }

  rpc WriteRelationships(WriteRelationshipsRequest) returns (WriteRelationshipsReply) {
    option (google.api.http) = { post: "/v1/iam/authz/relationships" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "repair_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.relationship.write" risk: "critical" }
    };
  }

  rpc DeleteRelationships(DeleteRelationshipsRequest) returns (DeleteRelationshipsReply) {
    option (google.api.http) = { post: "/v1/iam/authz/relationships:delete" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "repair_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.relationship.delete" risk: "critical" }
    };
  }

  rpc CheckAuthorization(CheckPermissionRequest) returns (CheckPermissionReply) {
    option (google.api.http) = { post: "/v1/iam/authz/permissions:check" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.permission.check" risk: "medium" }
    };
  }

  rpc ExplainAuthorization(CheckPermissionRequest) returns (ExplainAuthorizationReply) {
    option (google.api.http) = { post: "/v1/iam/authz/permissions:explain" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.permission.explain" risk: "medium" }
    };
  }

  rpc GetEffectivePermissions(GetEffectivePermissionsRequest) returns (GetEffectivePermissionsReply) {
    option (google.api.http) = { get: "/v1/iam/authz/effective-permissions" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view_relationships" resource: "iam_authz:global" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.authz.effective_permissions" risk: "medium" }
    };
  }
}

message VerifyTokenRequest { string token = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string token_type = 2; string org_id = 3; string app_id = 4; }
message GetMeRequest { bool include_profile = 1; }
message GetMeReply { Principal principal = 1; User user = 2; repeated Group groups = 3; Application application = 4; repeated string warnings = 5; }

message GetUserRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string user_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message ListUsersRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string query = 2; string group_id = 3; string role = 4; int32 page_size = 5; string page_token = 6; }
message ListUsersReply { repeated User users = 1; string next_page_token = 2; }
message GetOrganizationRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message ListGroupsRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string parent_id = 2; string type = 3; string user_id = 4; bool include_inherited = 5; }
message ListGroupsReply { repeated Group groups = 1; }
message GetGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string group_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message CreateGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; Group group = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; string idempotency_key = 3; }
message UpdateGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string group_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; Group group = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; }
message DeleteGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string group_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; bool recursive = 3; }
message AssignUserToGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string user_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string group_id = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message RemoveUserFromGroupRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string user_id = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string group_id = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }

message RetryDirectoryProjectionRequest { int32 limit = 1; }
message RetryDirectoryProjectionReply { int32 processed = 1; }
message ReconcileDirectoryProjectionRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message ReconcileDirectoryProjectionReply { string status = 1; int32 relationships = 2; }
message CheckDirectoryProjectionDriftRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message CheckDirectoryProjectionDriftReply { int32 desired = 1; int32 missing = 2; repeated string missing_relationships = 3; repeated Relationship missing_relationship_objects = 4; }

message CheckPermissionRequest { SubjectRef subject = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; ObjectRef resource = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; string permission = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string org_id = 4; string project_id = 5; }
message CheckPermissionReply { bool allowed = 1; string effect = 2; string reason = 3; string consistency_token = 4; }
message WriteRelationshipRequest { Relationship relationship = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; }
message WriteRelationshipReply { int32 written = 1; string consistency_token = 2; }
message DeleteRelationshipRequest { RelationshipFilter filter = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; }
message DeleteRelationshipReply { int32 deleted = 1; string consistency_token = 2; }
message LookupResourcesRequest { SubjectRef subject = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; string resource_type = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string permission = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; int32 limit = 4; string cursor = 5; }
message LookupResourcesReply { repeated ObjectRef resources = 1; string next_cursor = 2; string consistency_token = 3; }
message LookupSubjectsRequest { ObjectRef resource = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; string permission = 2 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string subject_type = 3 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; int32 limit = 4; string cursor = 5; }
message LookupSubjectsReply { repeated SubjectRef subjects = 1; string next_cursor = 2; string consistency_token = 3; }

message GetAuthorizationSchemaRequest {}
message AuthorizationSchema { string text = 1; string version = 2; }
message ValidateAuthorizationSchemaRequest { string text = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message ValidateAuthorizationSchemaReply { bool valid = 1; string error = 2; }
message PublishAuthorizationSchemaRequest { string text = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; }
message PublishAuthorizationSchemaReply { bool published = 1; }
message ListRelationshipsRequest { string resource_type = 1; string resource_id = 2; string relation = 3; string subject_type = 4; string subject_id = 5; string subject_relation = 6; }
message ListRelationshipsReply { repeated Relationship relationships = 1; }
message WriteRelationshipsRequest { repeated Relationship relationships = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).repeated.min_items = 1]; }
message WriteRelationshipsReply { int32 written = 1; string consistency_token = 2; }
message DeleteRelationshipsRequest { RelationshipFilter filter = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).required = true]; }
message DeleteRelationshipsReply { int32 deleted = 1; string consistency_token = 2; }
message ExplainAuthorizationReply { bool allowed = 1; string effect = 2; string reason = 3; string consistency_token = 4; repeated string steps = 5; }
message GetEffectivePermissionsRequest { string subject_type = 1; string subject_id = 2; string subject_relation = 3; string resource_type = 4; string resource_id = 5; repeated string permissions = 6; }
message GetEffectivePermissionsReply { SubjectRef subject = 1; ObjectRef resource = 2; map<string, PermissionDecision> permissions = 3; }
message PermissionDecision { bool allowed = 1; string effect = 2; string reason = 3; }

message TokenSet { string access_token = 1; string refresh_token = 2; string id_token = 3; string token_type = 4; string scope = 5; google.protobuf.Timestamp expires_at = 6; }
message Principal { string subject_id = 1; string subject_type = 2; string provider = 3; string external_id = 4; string issuer = 5; repeated string audience = 6; string tenant_id = 7; string org_id = 8; string app_id = 9; string project_id = 10; string username = 11; string name = 12; string email = 13; string phone = 14; repeated string roles = 15; repeated string groups = 16; repeated string scopes = 17; string auth_method = 18; google.protobuf.Timestamp issued_at = 19; google.protobuf.Timestamp expires_at = 20; }
message User { string id = 1; string external_id = 2; string provider = 3; string org_id = 4; string username = 5; string display_name = 6; string email = 7; string phone = 8; repeated string roles = 9; repeated string groups = 10; bool enabled = 11; }
message Organization { string id = 1; string external_id = 2; string name = 3; string display_name = 4; string owner_id = 5; string parent_id = 6; repeated string tags = 7; bool enabled = 8; }
message Group { string id = 1; string external_id = 2; string org_id = 3; string parent_id = 4; string name = 5; string display_name = 6; string type = 7; string path = 8; repeated string users = 9; }
message Application { string id = 1; string external_id = 2; string org_id = 3; string name = 4; string display_name = 5; string client_id = 6; repeated string redirect_uris = 7; repeated string grant_types = 8; repeated string scopes = 9; repeated string providers = 10; bool enable_password = 11; bool enable_signup = 12; }
message ObjectRef { string type = 1; string id = 2; }
message SubjectRef { string type = 1; string id = 2; string relation = 3; }
message Relationship { ObjectRef resource = 1; string relation = 2; SubjectRef subject = 3; }
message RelationshipFilter { string resource_type = 1; string resource_id = 2; string relation = 3; string subject_type = 4; string subject_id = 5; string subject_relation = 6; }
