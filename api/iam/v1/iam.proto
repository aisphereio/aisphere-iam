syntax = "proto3";

package iam.v1;

import "aisphere/access/v1/access.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/aisphereio/aisphere-iam/api/iam/v1;v1";

service IAMAuthService {
  rpc BuildLoginURL(BuildLoginURLRequest) returns (BuildLoginURLReply) {
    option (google.api.http) = { get: "/v1/iam/login-url" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.login_url" risk: "low" }
      rate_limit: { enabled: true key: "ip" qps: 5 burst: 10 backend: MEMORY }
    };
  }

  rpc ExchangeCode(ExchangeCodeRequest) returns (ExchangeCodeReply) {
    option (google.api.http) = { post: "/v1/iam/auth/exchange" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.exchange_code" risk: "medium" }
      rate_limit: { enabled: true key: "ip" qps: 3 burst: 5 backend: MEMORY }
    };
  }

  rpc RefreshToken(RefreshTokenRequest) returns (TokenSet) {
    option (google.api.http) = { post: "/v1/iam/auth/refresh" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "refresh" resource: "iam:session" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.refresh_token" risk: "medium" }
    };
  }

  rpc VerifyToken(VerifyTokenRequest) returns (Principal) {
    option (google.api.http) = { post: "/v1/iam/auth/verify" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: INTERNAL
      authz: { action: "verify" resource: "iam:token" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.verify_token" risk: "medium" }
      reason: "Token verification is only callable by trusted platform services."
    };
  }

  rpc ExternalAuthorize(google.protobuf.Empty) returns (Principal) {
    option (google.api.http) = { post: "/internal/iam/ext-authz" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.external_authorize" risk: "medium" }
      reason: "Gateway API / Envoy ExternalAuth endpoint. IAM validates the external bearer token and returns Gateway-controlled trusted identity headers."
    };
  }

  rpc RevokeToken(RevokeTokenRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { post: "/v1/iam/auth/revoke" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "revoke" resource: "iam:session" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.revoke_token" risk: "medium" }
    };
  }

  rpc GetMe(GetMeRequest) returns (GetMeReply) {
    option (google.api.http) = { get: "/v1/iam/me" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHENTICATED
      authz: { action: "read" resource: "iam:self" audience: "iam-service" mode: SELF_CHECK }
      audit: { enabled: true event: "iam.get_me" risk: "low" }
    };
  }

  rpc BuildLogoutURL(BuildLogoutURLRequest) returns (BuildLogoutURLReply) {
    option (google.api.http) = { get: "/v1/iam/logout-url" };
    option (aisphere.access.v1.policy) = {
      exposure: PUBLIC
      audit: { enabled: true event: "iam.logout_url" risk: "low" }
      rate_limit: { enabled: true key: "ip" qps: 5 burst: 10 backend: MEMORY }
    };
  }
}

service IAMDirectoryService {
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users/{user_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:user" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.get_user" risk: "low" }
    };
  }

  rpc ListUsers(ListUsersRequest) returns (ListUsersReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/users" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:user" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.list_users" risk: "low" }
    };
  }

  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "read" resource: "iam:org" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.get_org" risk: "low" }
    };
  }

  rpc ListGroups(ListGroupsRequest) returns (ListGroupsReply) {
    option (google.api.http) = { get: "/v1/iam/orgs/{org_id}/groups" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "list" resource: "iam:group" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.list_groups" risk: "low" }
    };
  }
}

service IAMPermissionService {
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionReply) {
    option (google.api.http) = { post: "/v1/iam/permissions/check" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "check" resource: "iam:permission" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.check_permission" risk: "medium" }
    };
  }

  rpc WriteRelationship(WriteRelationshipRequest) returns (WriteRelationshipReply) {
    option (google.api.http) = { post: "/v1/iam/relationships" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "write" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.write_relationship" risk: "high" }
    };
  }

  rpc DeleteRelationship(DeleteRelationshipRequest) returns (DeleteRelationshipReply) {
    option (google.api.http) = { delete: "/v1/iam/relationships" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "delete" resource: "iam:relationship" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.delete_relationship" risk: "high" }
    };
  }

  rpc LookupResources(LookupResourcesRequest) returns (LookupResourcesReply) {
    option (google.api.http) = { post: "/v1/iam/lookup/resources" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "lookup" resource: "iam:resource" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.lookup_resources" risk: "medium" }
    };
  }

  rpc LookupSubjects(LookupSubjectsRequest) returns (LookupSubjectsReply) {
    option (google.api.http) = { post: "/v1/iam/lookup/subjects" body: "*" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "lookup" resource: "iam:subject" audience: "iam-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "iam.lookup_subjects" risk: "medium" }
    };
  }
}

message BuildLoginURLRequest { string redirect_uri = 1; string state = 2; string scope = 3; string org_id = 4; string app_id = 5; }
message BuildLoginURLReply { string login_url = 1; string provider = 2; string redirect_uri = 3; string state = 4; string scope = 5; }
message ExchangeCodeRequest { string code = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string state = 2; string redirect_uri = 3; string org_id = 4; string app_id = 5; }
message ExchangeCodeReply { TokenSet tokens = 1; Principal principal = 2; }
message RefreshTokenRequest { string refresh_token = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string scope = 2; string org_id = 3; string app_id = 4; }
message VerifyTokenRequest { string token = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string token_type = 2; string org_id = 3; string app_id = 4; }
message RevokeTokenRequest { string token = 1 [(google.api.field_behavior) = REQUIRED, (buf.validate.field).string.min_len = 1]; string token_type = 2; }
message GetMeRequest { bool include_profile = 1; }
message GetMeReply { Principal principal = 1; repeated string warnings = 2; }
message BuildLogoutURLRequest { string post_logout_redirect_uri = 1; string id_token_hint = 2; string state = 3; string org_id = 4; string app_id = 5; }
message TokenSet { string access_token = 1; string refresh_token = 2; string id_token = 3; string token_type = 4; int64 expires_in = 5; google.protobuf.Timestamp expires_at = 6; map<string, string> raw = 7; }
message Principal { string subject = 1; string subject_type = 2; string provider = 3; string external_id = 4; string issuer = 5; repeated string audience = 6; string owner = 7; string org_id = 8; string app_id = 9; string project_id = 10; string username = 11; string name = 12; string email = 13; repeated string groups = 14; repeated string roles = 15; repeated string scopes = 16; map<string, string> attributes = 17; }
message User { string id = 1; string owner = 2; string name = 3; string display_name = 4; string email = 5; bool is_admin = 6; bool is_forbidden = 7; repeated string groups = 8; repeated string roles = 9; map<string, string> raw = 10; }
message Organization { string id = 1; string name = 2; string display_name = 3; string owner = 4; string parent_id = 5; map<string, string> raw = 6; }
message Group { string id = 1; string name = 2; string display_name = 3; string owner = 4; string parent_id = 5; repeated string users = 6; map<string, string> raw = 7; }
message GetUserRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED]; string user_id = 2 [(google.api.field_behavior) = REQUIRED]; }
message ListUsersRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED]; string keyword = 2; int32 page = 3; int32 page_size = 4; }
message ListUsersReply { repeated User users = 1; int64 total = 2; }
message GetOrganizationRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED]; }
message ListGroupsRequest { string org_id = 1 [(google.api.field_behavior) = REQUIRED]; string keyword = 2; }
message ListGroupsReply { repeated Group groups = 1; }
message CheckPermissionRequest { Principal principal = 1; string subject = 2; string relation = 3; string resource = 4; }
message CheckPermissionReply { bool allowed = 1; string reason = 2; }
message WriteRelationshipRequest { string resource = 1; string relation = 2; string subject = 3; }
message WriteRelationshipReply { bool written = 1; }
message DeleteRelationshipRequest { string resource = 1; string relation = 2; string subject = 3; }
message DeleteRelationshipReply { bool deleted = 1; }
message LookupResourcesRequest { string subject = 1; string relation = 2; string resource_type = 3; }
message LookupResourcesReply { repeated string resources = 1; }
message LookupSubjectsRequest { string resource = 1; string relation = 2; string subject_type = 3; }
message LookupSubjectsReply { repeated string subjects = 1; }
