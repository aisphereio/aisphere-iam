name: Deliver image and deployment YAML

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional additional immutable image tag
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: iam-delivery-${{ github.ref }}
  cancel-in-progress: true

env:
  KERNEL_VERSION: v0.4.19
  KUSTOMIZE_VERSION: v5.7.1
  REGISTRY: registry.cn-beijing.aliyuncs.com
  IMAGE_NAMESPACE: ainfracn
  IMAGE_NAME: aisphere-iam

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize compatibility base branch
        if: github.ref_name != 'main'
        shell: bash
        run: |
          set -euo pipefail
          git branch --force main origin/main
          git show-ref --verify refs/heads/main

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned generators and renderer
        shell: bash
        run: |
          set -euo pipefail
          make KERNEL_VERSION="${KERNEL_VERSION}" tools
          mkdir -p "${RUNNER_TEMP}/bin"
          GOBIN="${RUNNER_TEMP}/bin" go install "sigs.k8s.io/kustomize/kustomize/v5@${KUSTOMIZE_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Verify source and generated delivery surface
        shell: bash
        run: |
          set -euo pipefail
          make KERNEL_VERSION="${KERNEL_VERSION}" BASE_REF=main contract-check
          make KERNEL_VERSION="${KERNEL_VERSION}" deploy
          make permission-manifest-check
          go mod tidy
          go test ./... -count=1
          make traceability-check STRICT=1
          make build
          git diff --quiet --exit-code -- deploy/ go.mod go.sum

      - name: Verify rendered YAML
        shell: pwsh
        run: ./scripts/verify-kustomize-delivery.ps1

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned Kustomize
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          GOBIN="${RUNNER_TEMP}/bin" go install "sigs.k8s.io/kustomize/kustomize/v5@${KUSTOMIZE_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}

      - name: Verify immutable image inputs
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'relations: \[parent, zone, owner, editor, reviewer, publisher, viewer, custom_binding\]' configs/resource/defaults.yaml
          ! grep -q '^definition git_repository' configs/spicedb/aisphere.schema.zed
          sha256sum configs/resource/defaults.yaml configs/spicedb/aisphere.schema.zed

      - name: Build and publish immutable image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}-${{ github.sha }}
          no-cache: ${{ github.event_name == 'workflow_dispatch' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render digest-pinned delivery bundle
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}"
          image_ref="${image}@${IMAGE_DIGEST}"
          short_sha="${GITHUB_SHA:0:7}"

          mkdir -p dist/manifests dist/contract
          cp docs/openapi/aisphere.swagger.json dist/contract/aisphere.swagger.json
          printf '%s\n' "${image_ref}" > dist/image-ref.txt
          printf '%s\n' "${GITHUB_SHA}" > dist/source-sha.txt
          printf '%s\n' "${KERNEL_VERSION}" > dist/kernel-version.txt

          (cd deploy && kustomize edit set image "${image}=${image_ref}")
          kustomize build deploy > dist/manifests/aisphere-iam.yaml
          pwsh -File scripts/verify-kustomize-delivery.ps1

          contract_sha="$(sha256sum dist/contract/aisphere.swagger.json | awk '{print $1}')"
          jq -n \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg git_sha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF}" \
            --arg sha256 "${contract_sha}" \
            --arg kernel_version "${KERNEL_VERSION}" \
            '{repository:$repository,git_sha:$git_sha,ref:$ref,sha256:$sha256,kernel_version:$kernel_version}' \
            > dist/contract/contract-metadata.json

          (cd dist && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          (cd dist && zip -q -r "../aisphere-iam-delivery-${short_sha}.zip" .)

      - name: Upload delivery bundle
        uses: actions/upload-artifact@v4
        with:
          name: aisphere-iam-delivery-${{ github.sha }}
          path: aisphere-iam-delivery-*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach bundle to tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: aisphere-iam-delivery-*.zip
