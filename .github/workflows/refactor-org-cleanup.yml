name: One-off legacy organization cleanup

on:
  push:
    branches:
      - refactor/remove-legacy-organization-api
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'refactor/remove-legacy-organization-api' || github.ref == 'refs/heads/refactor/remove-legacy-organization-api'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/remove-legacy-organization-api
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Apply single-root refactor
        id: apply
        continue-on-error: true
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.github/scripts/refactor_org_cleanup.py')
          text = p.read_text()
          old = r'''sub(access, r'\n\tswitch op \{\n\tcase "CreateOrganization".*?\n\t\}\n', '\n')'''
          new = r'''sub(access, r'\n\t\tswitch op \{\n\t\tcase "CreateOrganization".*?\n\t\t\}\n', '\n')'''
          if old not in text:
              raise SystemExit('access cleanup matcher not found')
          p.write_text(text.replace(old, new, 1))
          PY
          python3 .github/scripts/refactor_org_cleanup.py > org-refactor.log 2>&1

      - name: Capture remaining Organization references
        if: always()
        run: |
          {
            echo '=== transform log ==='
            cat org-refactor.log 2>/dev/null || true
            echo
            echo '=== remaining control-plane references ==='
            grep -R --line-number -E 'CreateOrganization|ListOrganizations|UpdateOrganization|ArchiveOrganization|OrganizationModel|ResourceTypeOrganization|organization:\{org_id\}|iam_organizations' api/iam/project internal/biz/project internal/service internal/data internal/server 2>/dev/null || true
          } > org-refactor-diagnostics.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: org-refactor-diagnostics
          path: org-refactor-diagnostics.txt
          retention-days: 7

      - name: Stop when transform failed
        if: steps.apply.outcome == 'failure'
        run: |
          cat org-refactor-diagnostics.txt
          exit 1

      - name: Regenerate API and Gateway artifacts
        run: |
          make tools
          make api
          make deploy
          go mod tidy
          gofmt -w internal/biz/project/project.go internal/service/control_plane.go internal/server/access.go internal/biz/project/model_contract_test.go internal/data/resource_models.go internal/data/resource_repository.go internal/data/memory.go internal/biz/resource/service.go internal/biz/grant/service.go

      - name: Verify removed surface
        run: |
          ! grep -R --line-number --fixed-string 'rpc CreateOrganization' api/iam/project
          ! grep -R --line-number --fixed-string 'organization:{org_id}' api/iam/project internal/biz/project internal/service internal/data
          ! grep -R --line-number --fixed-string 'ResourceTypeOrganization' internal/biz/project internal/service internal/data
          ! grep -R --line-number --fixed-string 'OrganizationModel' internal/biz/project internal/service internal/data
          ! grep -R --line-number --fixed-string 'iam_organizations' internal/data

      - name: Commit regenerated tree
        if: github.event_name == 'push'
        run: |
          rm -f .github/workflows/refactor-org-cleanup.yml .github/scripts/refactor_org_cleanup.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'refactor(iam): remove legacy platform Organization surface'
          git push origin HEAD:refactor/remove-legacy-organization-api

      - name: Validate
        run: |
          make proto-check
          go test ./... -count=1
          make build
