name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra image tag to publish
        required: false
        type: string

permissions:
  contents: read

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  NAMESPACE: ainfracn
  IMAGE_NAME: aisphere-iam
  # Use Aliyun mirror for Docker Hub to avoid rate limits / timeouts
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}

      - name: Set up Docker daemon mirror
        run: |
          # Use Aliyun Docker Hub mirror for faster base image pulls
          sudo mkdir -p /etc/docker
          sudo tee /etc/docker/daemon.json > /dev/null <<'EOF'
          {
            "registry-mirrors": [
              "https://registry.cn-hangzhou.aliyuncs.com",
              "https://mirror.ccs.tencentyun.com"
            ]
          }
          EOF
          sudo systemctl restart docker || true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            KERNEL_VERSION=v0.4.5
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
