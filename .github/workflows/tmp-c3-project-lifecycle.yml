name: Temporary C3 project lifecycle

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lifecycle:
    if: github.head_ref == 'fix/c3-project-lifecycle'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KERNEL_VERSION: v0.4.3
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/c3-project-lifecycle
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Apply C3 implementation
        id: transform
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          sed -i 's#google/protobuf/field_behavior.proto#google/api/field_behavior.proto#g' .github/scripts/c3_project_lifecycle.py
          python3 .github/scripts/c3_project_lifecycle.py 2>&1 | tee c3-transform.log

      - name: Upload transform diagnostics
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: c3-project-transform-log
          path: c3-transform.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce transform result
        if: steps.transform.outcome == 'failure'
        run: exit 1

      - name: Format source
        run: |
          gofmt -w \
            internal/data/resource_models.go \
            internal/data/resource_repository.go \
            internal/data/memory.go \
            internal/data/project_lifecycle.go \
            internal/biz/project/project.go \
            internal/biz/project/lifecycle.go \
            internal/biz/project/lifecycle_test.go \
            internal/service/control_plane.go \
            internal/service/project_lifecycle.go \
            internal/service/project_lifecycle_test.go \
            internal/service/project_lifecycle_contract_test.go

      - name: Install generators
        run: make KERNEL_VERSION=${KERNEL_VERSION} tools

      - name: Generate API and deploy manifests
        run: |
          make KERNEL_VERSION=${KERNEL_VERSION} api
          make KERNEL_VERSION=${KERNEL_VERSION} deploy
          go mod tidy

      - name: Contract checks
        run: make KERNEL_VERSION=${KERNEL_VERSION} proto-check

      - name: Go tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          go test ./... -count=1 -v 2>&1 | tee c3-go-test.log

      - name: Upload test diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: c3-project-lifecycle-test-log
          path: c3-go-test.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Build and check drift
        run: |
          make build
          git diff --check

      - name: Commit verified product tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/tmp-c3-project-lifecycle.yml \
            .github/scripts/c3_project_lifecycle.py
          rmdir .github/scripts 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(iam): complete project lifecycle"
          git push origin HEAD:fix/c3-project-lifecycle
