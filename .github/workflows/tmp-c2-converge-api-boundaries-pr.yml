name: Temporary C2 convergence from PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  converge:
    if: github.head_ref == 'fix/c2-iam-api-boundaries'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KERNEL_VERSION: v0.4.3
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/c2-iam-api-boundaries
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Apply C2 decisions
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/c2_converge.py
          sed -i '/^import "google\/protobuf\/empty.proto";$/d' api/iam/v1/iam.proto

      - name: Format source
        run: |
          gofmt -w \
            internal/service/directory_group.go \
            internal/service/api_surface_contract_test.go \
            internal/data/identity_membership_projection_test.go \
            internal/data/identity_mode.go

      - name: Install generators
        run: make KERNEL_VERSION=${KERNEL_VERSION} tools

      - name: Generate API
        run: make KERNEL_VERSION=${KERNEL_VERSION} api

      - name: Generate deploy manifests
        run: make KERNEL_VERSION=${KERNEL_VERSION} deploy

      - name: Normalize modules
        run: go mod tidy

      - name: Contract checks
        id: contract
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make KERNEL_VERSION=${KERNEL_VERSION} proto-check 2>&1 | tee c2-contract.log

      - name: Upload contract diagnostics
        if: steps.contract.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: c2-contract-diagnostics
          path: c2-contract.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce contract result
        if: steps.contract.outcome == 'failure'
        run: exit 1

      - name: Go tests
        run: go test ./... -count=1

      - name: Build binary
        run: make build

      - name: Diff sanity
        run: git diff --check

      - name: Commit verified product tree
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/tmp-c2-converge-api-boundaries.yml \
            .github/workflows/tmp-c2-converge-api-boundaries-pr.yml \
            .github/scripts/c2_converge.py
          rmdir .github/scripts 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(iam): converge directory and relationship API boundaries"
          git push origin HEAD:fix/c2-iam-api-boundaries
