name: Integration Test

on:
  workflow_run:
    workflows: ["Docker image"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy and test
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: integration-test-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.cn-beijing.aliyuncs.com
  IMAGE_NAMESPACE: ainfracn
  IMAGE_NAME: aisphere-iam
  TEST_HOST: 36.137.200.194
  TEST_NAMESPACE: aisphere
  TEST_DEPLOYMENT: aisphere-iam

jobs:
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${{ github.sha_short }}" >> $GITHUB_OUTPUT
          fi

      - name: SSH to test server, pull image, update deployment, run tests
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.TEST_HOST }}
          username: root
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            FULL_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}"
            echo "=== 1. Pull image: $FULL_IMAGE ==="
            ctr -n k8s.io image pull "$FULL_IMAGE" 2>/dev/null || \
              crictl pull "$FULL_IMAGE" 2>/dev/null || \
              echo "Image pull skipped (will be pulled by kubelet)"

            echo "=== 2. Update deployment ==="
            kubectl set image deployment/${{ env.TEST_DEPLOYMENT }} -n ${{ env.TEST_NAMESPACE }} \
              ${{ env.TEST_DEPLOYMENT }}=$FULL_IMAGE
            kubectl rollout status deployment/${{ env.TEST_DEPLOYMENT }} -n ${{ env.TEST_NAMESPACE }} \
              --timeout=180s

            echo "=== 3. Wait for service ready ==="
            for i in $(seq 1 30); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18080/healthz 2>/dev/null || echo "000")
              if [[ "$HTTP_CODE" == "200" ]]; then
                echo "IAM service is ready (attempt $i)"
                break
              fi
              if [[ "$i" == "30" ]]; then
                echo "Timeout waiting for IAM service"
                exit 1
              fi
              echo "Attempt $i: HTTP $HTTP_CODE, waiting..."
              sleep 5
            done

            echo "=== 4. Run integration tests ==="
            # Create test database if not exists
            kubectl exec -n ${{ env.TEST_NAMESPACE }} apps-postgre-0 -- psql -U postgres \
              -tc "SELECT 1 FROM pg_database WHERE datname = 'aisphere_iam_test'" | grep -q 1 || \
            kubectl exec -n ${{ env.TEST_NAMESPACE }} apps-postgre-0 -- psql -U postgres \
              -c "CREATE DATABASE aisphere_iam_test"

            # Run tests using a temporary pod with Go
            cat <<'EOF' | kubectl apply -f -
            apiVersion: v1
            kind: Pod
            metadata:
              name: iam-integration-test
              namespace: ${{ env.TEST_NAMESPACE }}
            spec:
              containers:
              - name: tester
                image: golang:1.25.12-alpine
                command: ["sleep", "3600"]
              restartPolicy: Never
            EOF

            # Wait for pod ready
            kubectl wait --for=condition=ready pod/test-integration-test -n ${{ env.TEST_NAMESPACE }} --timeout=60s

            # Copy test files and run
            kubectl cp . test-integration-test:/app -n ${{ env.TEST_NAMESPACE }}
            kubectl exec -n ${{ env.TEST_NAMESPACE }} test-integration-test -- \
              sh -c "cd /app && go test -tags=integration ./internal/service/... -run TestIntegration -v -timeout 120s" \
              2>&1 | tee /tmp/integration-test.log

            # Cleanup
            kubectl delete pod test-integration-test -n ${{ env.TEST_NAMESPACE }} --force --grace-period=0 2>/dev/null || true

            echo "=== 5. Integration tests complete ==="