name: PR40 validation diagnostics

on:
  push:
    branches:
      - refactor/remove-legacy-organization-api
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/remove-legacy-organization-api
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Validate and capture logs
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          : > pr40-validation.log

          echo '=== make tools ===' | tee -a pr40-validation.log
          make tools 2>&1 | tee -a pr40-validation.log
          tools_status=${PIPESTATUS[0]}

          echo '=== make proto-check ===' | tee -a pr40-validation.log
          make proto-check 2>&1 | tee -a pr40-validation.log
          proto_status=${PIPESTATUS[0]}

          echo '=== go test ./... ===' | tee -a pr40-validation.log
          go test ./... -count=1 2>&1 | tee -a pr40-validation.log
          test_status=${PIPESTATUS[0]}

          echo '=== make build ===' | tee -a pr40-validation.log
          make build 2>&1 | tee -a pr40-validation.log
          build_status=${PIPESTATUS[0]}

          echo '=== generated tree cleanliness ===' | tee -a pr40-validation.log
          git status --short 2>&1 | tee -a pr40-validation.log
          dirty_status=0
          if [[ -n "$(git status --porcelain)" ]]; then dirty_status=1; fi

          echo "statuses: tools=${tools_status} proto=${proto_status} test=${test_status} build=${build_status} dirty=${dirty_status}" | tee -a pr40-validation.log
          if (( tools_status != 0 || proto_status != 0 || test_status != 0 || build_status != 0 || dirty_status != 0 )); then
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr40-validation-log
          path: pr40-validation.log
          retention-days: 7

      - name: Fail when validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
