name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: iam-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KERNEL_VERSION: v0.4.16
  KUSTOMIZE_VERSION: v5.7.1

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize PR base branch for compatibility checks
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git branch --force "${BASE_REF}" "origin/${BASE_REF}"
          git show-ref --verify "refs/heads/${BASE_REF}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Kernel version alignment
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(go list -m -f '{{.Version}}' github.com/aisphereio/kernel)"
          test "$runtime_version" = "$KERNEL_VERSION" || {
            echo "Kernel runtime is $runtime_version, expected $KERNEL_VERSION"
            exit 1
          }

      - name: Install pinned generators and renderer
        shell: bash
        run: |
          set -euo pipefail
          make KERNEL_VERSION="${KERNEL_VERSION}" tools
          mkdir -p "${RUNNER_TEMP}/bin"
          GOBIN="${RUNNER_TEMP}/bin" go install "sigs.k8s.io/kustomize/kustomize/v5@${KUSTOMIZE_VERSION}"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Check protobuf compatibility and OpenAPI contract
        run: make KERNEL_VERSION=${KERNEL_VERSION} BASE_REF=${{ github.base_ref || 'main' }} contract-check

      - name: Generate deploy manifests and normalize module graph
        run: |
          make KERNEL_VERSION=${KERNEL_VERSION} deploy
          go mod tidy

      - name: Check permission manifest
        run: make permission-manifest-check

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          go test ./... -count=1 -v 2>&1 | tee go-test.log

      - name: Check traceability
        run: make traceability-check STRICT=1

      - name: Build binary
        run: make build

      - name: Render and verify delivery YAML
        shell: pwsh
        run: |
          kustomize build deploy > $env:RUNNER_TEMP/aisphere-iam.yaml
          ./scripts/verify-kustomize-delivery.ps1

      - name: Check deploy and module files are committed
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet --exit-code -- deploy/ go.mod go.sum; then
            echo "Deploy manifests or module files are stale."
            git status --short -- deploy/ go.mod go.sum
            git diff --stat -- deploy/ go.mod go.sum
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: aisphere-iam:ci-${{ github.sha }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload Go test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iam-go-test-log
          path: go-test.log
          if-no-files-found: warn
          retention-days: 7
