name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: iam-authzgrpc-runtime-final
  cancel-in-progress: true

jobs:
  final:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final branch
        uses: actions/checkout@v4
        with:
          ref: fix/authzgrpc-runtime-final
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up patched Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Apply validated IAM source changes
        run: |
          git checkout origin/fix/authzgrpc-kernel-contract -- \
            api/iam/resource/v1/resource.proto \
            api/iam/v1/iam.proto \
            api/iam/v1/identity_admin.proto \
            client/authzgrpc/client.go \
            client/authzgrpc/client_test.go \
            internal/data/identity_mode.go \
            internal/data/identity_mode_test.go \
            internal/service/iam.go
          sed -i 's/^ARG GO_VERSION=.*/ARG GO_VERSION=1.25.12/' Dockerfile
          gofmt -w client/authzgrpc/client.go client/authzgrpc/client_test.go internal/data/identity_mode.go internal/data/identity_mode_test.go internal/service/iam.go

      - name: Generate API and deploy manifests
        run: |
          make tools
          make api
          make deploy

      - name: Normalize module graph
        run: go mod tidy

      - name: Contract checks
        run: make proto-check

      - name: Test
        run: go test ./... -count=1

      - name: Build binary
        run: make build

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-iam:${{ github.sha }} .

      - name: Commit final IAM changes
        shell: bash
        run: |
          set -euxo pipefail
          git checkout origin/main -- .github/workflows/ci.yml
          sed -i "s/go-version: '1.25.8'/go-version: '1.25.12'/" .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "fix: expose IAM runtime authorization gRPC API"
          fi
          git push origin HEAD:fix/authzgrpc-runtime-final
