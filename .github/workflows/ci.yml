name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: iam-authzgrpc-contract-diagnostics
  cancel-in-progress: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/authzgrpc-kernel-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect permission service implementation
        run: |
          if [ -f .github/iam-authzgrpc-diagnostics.txt ]; then
            echo "diagnostics already collected"
            exit 0
          fi
          {
            echo '=== FILE LIST ==='
            find internal/service internal/server api/iam/v1 -maxdepth 2 -type f | sort
            echo
            echo '=== MATCHING GO FILES ==='
            for file in $(grep -R -l -E 'CheckPermission|WriteRelationship|DeleteRelationship|LookupResources|LookupSubjects' internal api/iam/v1 --include='*.go' --include='*.proto' | sort -u); do
              echo
              echo "===== ${file} ====="
              cat "${file}"
            done
          } > .github/iam-authzgrpc-diagnostics.txt

      - name: Commit diagnostics
        run: |
          if git diff --quiet -- .github/iam-authzgrpc-diagnostics.txt && git ls-files --error-unmatch .github/iam-authzgrpc-diagnostics.txt >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f .github/iam-authzgrpc-diagnostics.txt
          git commit -m "chore: capture IAM authz gRPC implementation"
          git push origin HEAD:fix/authzgrpc-kernel-contract
