name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Generate API and deploy manifests
        run: |
          make tools
          make api
          make deploy

      - name: Contract checks
        run: make proto-check

      - name: Test
        run: go test ./...

      - name: Build binary
        run: make build

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-iam:${{ github.sha }} .
