name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: iam-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  KERNEL_VERSION: v0.4.9

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Kernel version alignment
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(go list -m -f '{{.Version}}' github.com/aisphereio/kernel)"
          test "$runtime_version" = "$KERNEL_VERSION" || {
            echo "Kernel runtime is $runtime_version, expected $KERNEL_VERSION"
            exit 1
          }

      - name: Install code generators
        run: make KERNEL_VERSION=${KERNEL_VERSION} tools

      - name: Generate API and deploy manifests
        run: |
          make KERNEL_VERSION=${KERNEL_VERSION} api
          make KERNEL_VERSION=${KERNEL_VERSION} deploy

      - name: Normalize module graph
        run: go mod tidy

      - name: Upload normalized module files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iam-module-files
          path: |
            go.mod
            go.sum
          if-no-files-found: error
          retention-days: 7

      - name: Contract checks
        run: make KERNEL_VERSION=${KERNEL_VERSION} proto-check

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          go test ./... -count=1 -v 2>&1 | tee go-test.log

      - name: Upload Go test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iam-go-test-log
          path: go-test.log
          if-no-files-found: warn
          retention-days: 7

      - name: Build binary
        run: make build

      - name: Check generated and module files are committed
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet --exit-code; then
            echo "Generated or module files are stale. Run: make tools api deploy && go mod tidy"
            git status --short
            git diff --stat
            exit 1
          fi
