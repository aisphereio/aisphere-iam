name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: iam-authzgrpc-runtime-repair
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/authzgrpc-kernel-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true

      - name: Apply runtime authorization API repair
        run: python3 .github/scripts/apply_authzgrpc_runtime_api.py

      - name: Format source
        run: gofmt -w client/authzgrpc/client.go client/authzgrpc/client_test.go internal/service/iam.go

      - name: Generate API and deploy manifests
        run: |
          make tools
          make api
          make deploy

      - name: Contract checks
        run: make proto-check

      - name: Test
        run: go test ./... -count=1

      - name: Build binary
        run: make build

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-iam:${{ github.sha }} .

      - name: Commit final IAM repair
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/scripts/apply_authzgrpc_runtime_api.py .github/iam-authzgrpc-diagnostics.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --stat
          git commit -m "fix: expose complete IAM runtime authorization gRPC API"
          git push origin HEAD:fix/authzgrpc-kernel-contract
