# IAM Console — 聚合 HTTPRoute 和 OIDC SecurityPolicy
#
# 这个文件定义 IAM 管理控制台的完整入口：
# - 一个聚合 HTTPRoute 覆盖前端页面和后端 API
# - 一个 OIDC SecurityPolicy 保护所有 IAM 路由
#
# 这样前端页面（/）和后端 API（/v1/iam/*）都使用同一个 Casdoor Application
# 和同一套 OIDC 配置，避免 API Route 没有 OIDC 保护的问题。
#
# 注意：生成的单个 API Route（如 i-a-m-auth-service-authenticated）仍然存在，
# 但 Gateway API 的路由匹配规则中，更具体的路径前缀会优先匹配。
# 如果生成的 Route 没有绑定 SecurityPolicy，请求会落到没有 OIDC 保护的路由上。
# 因此这个聚合 Route 覆盖所有路径，确保整个 iam.weagent.cc 域名都受 OIDC 保护。

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: iam-console
  namespace: aisphere
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aisphere-gateway
      namespace: aisphere-system
      sectionName: https
  hostnames:
    - iam.weagent.cc
  rules:
    # 前端页面
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aisphere-iam-frontend
          port: 3000
    # IAM 后端 API
    - matches:
        - path:
            type: PathPrefix
            value: /v1/iam
      backendRefs:
        - name: aisphere-iam
          port: 18080
---
apiVersion: v1
kind: Secret
metadata:
  name: casdoor-iam-web-oidc
  namespace: iam
type: Opaque
stringData:
  client-secret: "CHANGE_ME_IAM_OIDC_CLIENT_SECRET"
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: iam-console-oidc
  namespace: iam
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: iam-console
  oidc:
    provider:
      issuer: https://casdoor.weagent.cc
    clientID: aisphere-iam-web
    clientSecret:
      name: casdoor-iam-web-oidc
    redirectURL: https://iam.weagent.cc/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - profile
      - email
    refreshToken: true
    forwardAccessToken: true
    passThroughAuthHeader: true
    cookieNames:
      accessToken: IAM-AccessToken
      idToken: IAM-IDToken
  jwt:
    providers:
      - name: casdoor
        issuer: "https://casdoor.weagent.cc"
        audiences:
          - "aisphere-iam-web"
        remoteJWKS:
          uri: "https://casdoor.weagent.cc/.well-known/jwks"
        claimToHeaders:
          - claim: sub
            header: x-aisphere-external-sub
          - claim: email
            header: x-aisphere-external-email
          - claim: name
            header: x-aisphere-external-name
          - claim: preferred_username
            header: x-aisphere-external-username
          - claim: iss
            header: x-aisphere-external-issuer
          - claim: owner
            header: x-aisphere-external-owner
          - claim: id
            header: x-aisphere-external-id
          - claim: displayName
            header: x-aisphere-external-display-name
          - claim: scope
            header: x-aisphere-external-scope