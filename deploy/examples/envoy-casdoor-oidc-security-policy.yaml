# Example only. Generated manifests should come from Kernel protoc/deploy generators.
# This file documents the OIDC-only phase for Envoy Gateway + Casdoor.
# It intentionally does not configure Gateway ExternalAuth.
#
# Each frontend application uses its own Casdoor Application, clientID, HTTPRoute,
# and SecurityPolicy. This example shows the IAM console configuration.

apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: aisphere-sanitize-headers
  namespace: aisphere-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: aisphere-gateway
    namespace: aisphere-system
  headers:
    earlyRequestHeaders:
      remove:
        - x-aisphere-external-sub
        - x-aisphere-external-email
        - x-aisphere-external-name
        - x-aisphere-external-username
        - x-aisphere-external-issuer
        - x-aisphere-external-display-name
        - x-aisphere-external-phone
        - x-aisphere-external-owner
        - x-aisphere-external-scope
        - x-aisphere-external-id
        - x-aisphere-principal
        - x-aisphere-user-id
        - x-aisphere-org-id
        - x-aisphere-project-id
        - x-aisphere-roles
        - x-aisphere-auth-verified
        - x-aisphere-subject
        - x-aisphere-provider
        - x-aisphere-app-id
        - x-aisphere-authz-decision-id
        - x-aisphere-internal-jwt
        - x-internal-jwt
---
# IAM Console frontend — uses its own Casdoor Application and SecurityPolicy
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: iam-console
  namespace: aisphere
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: aisphere-gateway
      namespace: aisphere-system
      sectionName: https
  hostnames:
    - iam.weagent.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: aisphere-iam-frontend
          port: 3000
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: iam-console-oidc
  namespace: aisphere
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: iam-console
  oidc:
    provider:
      issuer: https://casdoor.weagent.cc
    clientID: aisphere-iam-web
    clientSecret:
      name: casdoor-iam-web-oidc
    redirectURL: https://iam.weagent.cc/oauth2/callback
    logoutPath: /logout
    scopes:
      - openid
      - profile
      - email
    refreshToken: true
    forwardAccessToken: true
    passThroughAuthHeader: true
    cookieNames:
      accessToken: Aisphere-IAM-AccessToken
      idToken: Aisphere-IAM-IDToken
  jwt:
    providers:
      - name: casdoor
        issuer: "https://casdoor.weagent.cc"
        audiences:
          - "aisphere-iam-web"
        remoteJWKS:
          uri: "https://casdoor.weagent.cc/.well-known/jwks"
        claimToHeaders:
          - claim: sub
            header: x-aisphere-external-sub
          - claim: email
            header: x-aisphere-external-email
          - claim: name
            header: x-aisphere-external-name
          - claim: preferred_username
            header: x-aisphere-external-username
          - claim: iss
            header: x-aisphere-external-issuer
          - claim: owner
            header: x-aisphere-external-owner
          - claim: id
            header: x-aisphere-external-id
          - claim: displayName
            header: x-aisphere-external-display-name
          - claim: scope
            header: x-aisphere-external-scope