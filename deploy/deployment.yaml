apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisphere-iam
  namespace: aisphere
  labels:
    app: aisphere-iam
    service: iam
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aisphere-iam
  template:
    metadata:
      labels:
        app: aisphere-iam
        service: iam
    spec:
      serviceAccountName: aisphere-iam
      imagePullSecrets:
        - name: aliyun-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: aisphere-iam-config
        - name: spicedb-schema
          configMap:
            name: aisphere-iam-spicedb-schema
      containers:
        - name: iam
          image: registry.cn-beijing.aliyuncs.com/ainfracn/aisphere-iam:latest
          imagePullPolicy: Always
          command:
            - /app/server
          args:
            - -conf
            - /app/configs/config.yaml
          ports:
            - containerPort: 18080
              name: http
            - containerPort: 19080
              name: grpc
            - containerPort: 19180
              name: metrics
          env:
            - name: KERNEL_ENV
              value: "production"
            - name: TZ
              value: "Asia/Shanghai"
            # Secrets injected from aisphere-iam-secrets
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: postgres-dsn
            - name: CASDOOR_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: casdoor-client-id
            - name: CASDOOR_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: casdoor-client-secret
            - name: CASDOOR_M2M_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: casdoor-m2m-client-id
            - name: CASDOOR_M2M_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: casdoor-m2m-client-secret
            - name: INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: internal-token
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: spicedb-token
            - name: DTM_BRANCH_SECRET
              valueFrom:
                secretKeyRef:
                  name: aisphere-iam-secrets
                  key: dtm-branch-secret
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: spicedb-schema
              mountPath: /app/configs/spicedb/aisphere.schema.zed
              subPath: aisphere.schema.zed
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aisphere-iam
  namespace: aisphere
