apiVersion: v1
kind: Secret
metadata:
  name: aisphere-iam-secrets
  namespace: aisphere
type: Opaque
stringData:
  # PostgreSQL
  postgres-dsn: "postgres://postgres:CHANGE_ME_PASSWORD@postgres.aisphere:5432/aisphere_iam?sslmode=disable"

  # Casdoor OIDC
  casdoor-client-id: "CHANGE_ME_CLIENT_ID"
  casdoor-client-secret: "CHANGE_ME_CLIENT_SECRET"

  # Casdoor M2M Admin
  casdoor-m2m-client-id: "CHANGE_ME_M2M_CLIENT_ID"
  casdoor-m2m-client-secret: "CHANGE_ME_M2M_CLIENT_SECRET"

  # Internal Service Token
  internal-token: "CHANGE_ME_INTERNAL_TOKEN"

  # SpiceDB
  spicedb-token: "CHANGE_ME_SPICEDB_TOKEN"

  # DTM
  dtm-branch-secret: "CHANGE_ME_DTM_BRANCH_SECRET"