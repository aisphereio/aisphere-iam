apiVersion: v1
kind: ConfigMap
metadata:
  name: aisphere-iam-config
  namespace: aisphere
data:
  config.yaml: |
    service:
      name: iam-service
      version: dev
      env: prod

    server:
      http:
        addr: 0.0.0.0:18080
        timeout_ns: 5000000000
        cors:
          enabled: true
          allowed_origins: ["*"]
          allowed_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
          allowed_headers: [Authorization, Content-Type, X-Request-ID, X-Trace-ID, Traceparent, Tracestate]
          exposed_headers: [X-Request-ID]
          allow_credentials: false
          max_age_ns: 3600000000000
      grpc:
        addr: 0.0.0.0:19080
        timeout_ns: 5000000000

    log:
      service_name: iam-service
      env: prod
      version: dev
      level: info
      format: json
      output: stdout
      add_source: false
      redact:
        enabled: true
        keys: [password, secret, token, access_key, secret_key, client_secret]
        value: "***"
      access_log:
        enabled: true
        skip_paths: [/healthz, /readyz, /metrics]
        slow_threshold: 1000000000
        request_id_header: X-Request-ID
        route_header: X-Route-Pattern
        log_user_agent: true

    data:
      database:
        enabled: true
        config:
          auto_create_database: false
          driver: postgres
          dsn: "postgres://postgres:CHANGE_ME_PASSWORD@postgres.aisphere:5432/aisphere_iam?sslmode=disable"
          max_open_conns: 20
          max_idle_conns: 10
          conn_max_lifetime_ns: 1800000000
          conn_max_idle_time_ns: 300000000
          query_timeout_ns: 5000000000
          slow_query_threshold_ns: 200000000
          audit_enabled: true
          metrics_enabled: true
      migration:
        enabled: true
        config:
          enabled: true
          engine: goose
          dir: migrations
          table: iam_schema_migrations
          mode: apply
          fail_on_pending: false
          allow_concurrent: false
      cache:
        enabled: false
      object_store:
        enabled: false

    security:
      authn:
        enabled: true
        mode: gateway_trusted
        provider: casdoor
        cache_ttl_ns: 300000000000
        oidc:
          provider: casdoor
          issuer: http://casdoor.aisphere:8000
          discovery_url: http://casdoor.aisphere:8000/.well-known/openid-configuration
          jwks_url: http://casdoor.aisphere:8000/.well-known/jwks
          audience: [CHANGE_ME_CLIENT_ID]
          allowed_owners: [aisphere]
          allowed_algs: [RS256, RS512, ES256, ES512]
          jwks_cache_ttl_ns: 600000000000
          clock_skew_ns: 60000000000
        casdoor:
          endpoint: http://casdoor.aisphere:8000
          organization_name: aisphere
          application_name: aisphere
          client_id: CHANGE_ME_CLIENT_ID
          client_secret: "CHANGE_ME_CLIENT_SECRET"
          jwt_certificate_file: /app/configs/casdoor.pub
          timeout: 10000000000
          metrics_enabled: true
          admin:
            enabled: true
            organization_name: aisphere
            application_name: iam-service
            client_id: "CHANGE_ME_M2M_CLIENT_ID"
            client_secret: "CHANGE_ME_M2M_CLIENT_SECRET"
            jwt_certificate_file: /app/configs/casdoor.pub
      internal_call:
        enabled: true
        header: X-Aisphere-Internal-Token
        token: "CHANGE_ME_INTERNAL_TOKEN"
      authz:
        enabled: true
        provider: spicedb
        dev_allow_all: false
        install_default_schema: true
        schema_path: /app/configs/spicedb/aisphere.schema.zed
        spicedb:
          endpoint: spicedb.aisphere:50051
          token: "CHANGE_ME_SPICEDB_TOKEN"
          transport: grpc
          insecure: true
          timeout: 5000000000
          fully_consistent: true
          metrics_enabled: true

    control_plane:
      defaults:
        enabled: true
        path: configs/resource/defaults.yaml

    audit:
      enabled: true
      store: memory

    metrics:
      enabled: true
      addr: 0.0.0.0:19180
      path: /metrics
      pprof: false
      runtime: true

    dtm:
      enabled: true
      driver: dtm
      protocol: http
      server: http://dtm.aisphere:36789/api/dtmsvr
      service_base_url: http://aisphere-iam.aisphere:18080
      branch_prefix: /internal/dtm
      branch_secret: "aisphere-dtm-branch-secret-2026"
      wait_result: true
      timeout_ns: 10000000000
      metrics_enabled: true

  aisphere.schema.zed: |
    definition user {}

    definition service {}

    definition service_account {}

    definition group {
      // Casdoor Group mapped into an Aisphere availability zone.
      // A group is both a manageable resource and an authorization subject via #member.
      relation zone: zone
      relation parent: group

      relation member: user | service | service_account | group#member
      relation owner: user | service | service_account | group#member
      relation manager: user | service | service_account | group#member
      relation viewer: user | service | service_account | group#member
      relation permission_admin: user | service | service_account | group#member

      permission view = member + viewer + manager + owner + zone->view_groups + parent->view
      permission manage = owner + manager + zone->manage_groups + parent->manage
      permission create_child_groups = owner + manager + zone->create_groups + parent->create_child_groups
      permission manage_members = owner + manager + zone->manage_users + parent->manage_members
      permission view_permissions = owner + permission_admin + zone->view_permissions + parent->view_permissions
      permission manage_permissions = owner + permission_admin + zone->manage_permissions + parent->manage_permissions
    }

    definition zone {
      // Casdoor Organization mapped as the top-level availability-zone resource.
      // The frontend treats zones as read-only roots; IAM grants decide who can manage below them.
      relation member: user | service | service_account | group#member

      relation owner: user | service | service_account | group#member
      relation admin: user | service | service_account | group#member

      relation user_viewer: user | service | service_account | group#member
      relation user_manager: user | service | service_account | group#member

      relation group_viewer: user | service | service_account | group#member
      relation group_manager: user | service | service_account | group#member

      relation permission_admin: user | service | service_account | group#member

      permission view_zone = member + owner + admin

      permission view_users = owner + admin + user_viewer + user_manager
      permission manage_users = owner + admin + user_manager

      permission view_groups = owner + admin + group_viewer + group_manager
      permission create_groups = owner + admin + group_manager
      permission manage_groups = owner + admin + group_manager

      permission view_permissions = owner + admin + permission_admin
      permission manage_permissions = owner + admin + permission_admin
    }

    definition iam_authz {
      // Global IAM authorization-control resource for SpiceDB schema, relationships,
      // permission explain, drift repair, and Permission Console operations.
      relation owner: user | service | service_account | group#member
      relation admin: user | service | service_account | group#member
      relation schema_admin: user | service | service_account | group#member
      relation auditor: user | service | service_account | group#member

      permission view_schema = owner + admin + schema_admin + auditor
      permission publish_schema = owner + admin + schema_admin
      permission view_relationships = owner + admin + schema_admin + auditor
      permission repair_relationships = owner + admin + schema_admin
      permission manage = owner + admin + schema_admin
    }

    definition iam {
      relation admin: user | group#member | service | service_account

      permission create = admin
      permission read = admin
      permission list = admin
      permission manage = admin
      permission create_project = admin
      permission upsert = admin
      permission bind = admin
      permission unbind = admin
      permission move = admin
      permission archive = admin
      permission delete = admin
      permission grant = admin
      permission revoke = admin
      permission explain = admin
    }

    definition organization {
      relation owner: user | group#member
      relation admin: user | group#member
      relation member: user | group#member
      relation auditor: user | group#member

      permission manage = owner + admin
      permission view = manage + member + auditor
      permission read = view
      permission list = view
      permission create_project = manage
      permission audit = manage + auditor
    }

    definition project {
      relation parent: organization

      relation owner: user | group#member
      relation admin: user | group#member
      relation developer: user | group#member
      relation operator: user | group#member
      relation viewer: user | group#member

      permission manage = owner + admin + parent->manage
      permission write = manage + developer
      permission operate = manage + operator
      permission read = write + operate + viewer + parent->view
      permission list = read
    }

    definition skill_space {
      relation parent: project

      relation owner: user | group#member
      relation editor: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->write
      permission view = edit + viewer + parent->read
    }

    definition skill {
      relation parent: skill_space

      relation owner: user | group#member
      relation editor: user | group#member
      relation reviewer: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->edit
      permission review = manage + reviewer
      permission publish = manage + reviewer
      permission view = edit + viewer + parent->view
    }

    definition git_namespace {
      relation parent: project

      relation owner: user | group#member
      relation developer: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission write = manage + developer + parent->write
      permission read = write + viewer + parent->read
    }

    definition git_repository {
      relation parent: git_namespace
      relation backing_skill: skill

      relation owner: user | group#member
      relation maintainer: user | group#member
      relation writer: user | group#member
      relation reader: user | group#member

      permission admin = owner + maintainer + parent->manage
      permission write = admin + writer + parent->write + backing_skill->edit
      permission read = write + reader + parent->read + backing_skill->view
    }

    definition agent_space {
      relation parent: project

      relation owner: user | group#member
      relation editor: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->write
      permission view = edit + viewer + parent->read
    }

    definition agent {
      relation parent: agent_space

      relation owner: user | group#member
      relation editor: user | group#member
      relation operator: user | group#member
      relation executor: user | group#member | service_account
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->edit
      permission operate = manage + operator
      permission execute = manage + executor
      permission view = edit + operate + viewer + parent->view
    }

    definition tool_space {
      relation parent: project

      relation owner: user | group#member
      relation editor: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->write
      permission view = edit + viewer + parent->read
    }

    definition tool {
      relation parent: tool_space

      relation owner: user | group#member
      relation editor: user | group#member
      relation executor: user | group#member | service_account | agent
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission edit = manage + editor + parent->edit
      permission execute = manage + executor
      permission view = edit + viewer + parent->view
    }

    definition sandbox_space {
      relation parent: project

      relation owner: user | group#member
      relation operator: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission operate = manage + operator + parent->write
      permission view = operate + viewer + parent->read
    }

    definition sandbox {
      relation parent: sandbox_space

      relation owner: user | group#member
      relation operator: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission operate = manage + operator + parent->write
      permission view = operate + viewer + parent->view
    }

    definition runtime_environment {
      relation parent: project

      relation owner: user | group#member
      relation deployer: user | group#member | service_account
      relation operator: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission deploy = manage + deployer + parent->write
      permission operate = manage + operator
      permission view = deploy + operate + viewer + parent->read
    }

    definition deployment {
      relation parent: runtime_environment
      relation runs_agent: agent

      relation owner: user | group#member
      relation operator: user | group#member
      relation viewer: user | group#member

      permission manage = owner + parent->manage
      permission operate = manage + operator + parent->operate
      permission view = operate + viewer + parent->view + runs_agent->view
    }
