# Built-in Aisphere resource-control-plane defaults.
# Casdoor Organization maps to resource type `zone` beneath the stable platform root.
# Administrator assignments live on the narrowest scope and inherit through SpiceDB.
capabilities:
  - id: iam
    name: iam
    display_name: Aisphere IAM
    owner_service: aisphere-iam
    status: active
  - id: hub
    name: hub
    display_name: Aisphere Hub
    owner_service: aisphere-hub
    status: active
  - id: agent
    name: agent
    display_name: Agent Service
    owner_service: aisphere-agent
    status: active
  - id: tools
    name: tools
    display_name: Tool Registry
    owner_service: aisphere-tools
    status: active
  - id: sandbox
    name: sandbox
    display_name: Sandbox Service
    owner_service: aisphere-sandbox
    status: active
  - id: runtime
    name: runtime
    display_name: Runtime Service
    owner_service: aisphere-runtime
    status: active

resource_types:
  - type: zone
    capability_id: iam
    owner_service: aisphere-iam
    parent_types: []
    grantable: true
    auditable: true
    spicedb_type: zone
    relations: [platform, owner, admin, user_viewer, user_manager, group_viewer, group_manager, permission_admin, member, custom_binding]
    permissions: [view_zone, view_skills, create_skill, manage_skills, create_cluster, manage_clusters, view_users, manage_users, view_groups, create_groups, manage_groups, view_permissions, manage_permissions]
    status: active
  - type: group
    capability_id: iam
    owner_service: aisphere-iam
    parent_types: [zone, group]
    grantable: true
    auditable: true
    spicedb_type: group
    relations: [zone, parent, member, owner, manager, viewer, permission_admin, custom_binding]
    permissions: [view, manage, create_child_groups, manage_members, view_permissions, manage_permissions]
    status: active
  - type: project
    capability_id: iam
    owner_service: aisphere-iam
    parent_types: [zone]
    grantable: true
    auditable: true
    spicedb_type: project
    relations: [zone, owner, admin, developer, operator, viewer, custom_binding]
    permissions: [manage, write, create_skill, operate, read, list]
    status: active
  - type: skill_space
    capability_id: hub
    owner_service: aisphere-hub
    parent_types: [project]
    grantable: true
    auditable: true
    spicedb_type: skill_space
    relations: [parent, owner, editor, viewer, custom_binding]
    permissions: [manage, edit, view]
    status: active
  - type: skill
    capability_id: hub
    owner_service: aisphere-hub
    parent_types: [skill_space]
    grantable: true
    auditable: true
    spicedb_type: skill
    relations: [parent, zone, owner, editor, reviewer, publisher, viewer, custom_binding]
    permissions: [manage, edit, review, publish, view]
    status: active
  - type: agent_space
    capability_id: agent
    owner_service: aisphere-agent
    parent_types: [project]
    grantable: true
    auditable: true
    spicedb_type: agent_space
    relations: [parent, owner, editor, viewer, custom_binding]
    permissions: [manage, edit, view]
    status: active
  - type: agent
    capability_id: agent
    owner_service: aisphere-agent
    parent_types: [agent_space]
    grantable: true
    auditable: true
    spicedb_type: agent
    relations: [parent, owner, editor, operator, executor, viewer, custom_binding]
    permissions: [manage, edit, operate, execute, view]
    status: active
  - type: tool_space
    capability_id: tools
    owner_service: aisphere-tools
    parent_types: [project]
    grantable: true
    auditable: true
    spicedb_type: tool_space
    relations: [parent, owner, editor, viewer, custom_binding]
    permissions: [manage, edit, view]
    status: active
  - type: tool
    capability_id: tools
    owner_service: aisphere-tools
    parent_types: [tool_space]
    grantable: true
    auditable: true
    spicedb_type: tool
    relations: [parent, owner, editor, executor, viewer, custom_binding]
    permissions: [manage, edit, execute, view]
    status: active
  - type: sandbox_space
    capability_id: sandbox
    owner_service: aisphere-sandbox
    parent_types: [project]
    grantable: true
    auditable: true
    spicedb_type: sandbox_space
    relations: [parent, owner, operator, viewer, custom_binding]
    permissions: [manage, operate, view]
    status: active
  - type: sandbox
    capability_id: sandbox
    owner_service: aisphere-sandbox
    parent_types: [sandbox_space]
    grantable: true
    auditable: true
    spicedb_type: sandbox
    relations: [parent, owner, operator, viewer, custom_binding]
    permissions: [manage, operate, view]
    status: active
  - type: runtime_environment
    capability_id: runtime
    owner_service: aisphere-runtime
    parent_types: [project]
    grantable: true
    auditable: true
    spicedb_type: runtime_environment
    relations: [parent, owner, deployer, operator, viewer, custom_binding]
    permissions: [manage, deploy, operate, view]
    status: active
  - type: deployment
    capability_id: runtime
    owner_service: aisphere-runtime
    parent_types: [runtime_environment]
    grantable: true
    auditable: true
    spicedb_type: deployment
    relations: [parent, owner, operator, viewer, runs_agent, custom_binding]
    permissions: [manage, operate, view]
    status: active
  - type: k8s_cluster
    capability_id: hub
    owner_service: aisphere-hub
    parent_types: [zone]
    grantable: true
    auditable: true
    spicedb_type: k8s_cluster
    relations: [zone, owner, admin, operator, viewer, custom_binding]
    permissions: [manage, operate, view, create_namespace]
    status: active
  - type: k8s_namespace
    capability_id: hub
    owner_service: aisphere-hub
    parent_types: [k8s_cluster]
    grantable: true
    auditable: true
    spicedb_type: k8s_namespace
    relations: [cluster, owner, editor, user, viewer, custom_binding]
    permissions: [manage, edit, use, view]
    status: active

