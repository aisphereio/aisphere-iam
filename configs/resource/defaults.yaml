bootstrap:
  default_role: zone_owner
  platform_id: global
  roles:
    platform_owner:
      scope: platform
      relation: owner
    platform_admin:
      scope: platform
      relation: admin
    zone_owner:
      aliases: [owner]
      scope: zone
      relation: owner
    zone_admin:
      aliases: [admin]
      scope: zone
      relation: admin
    user_viewer:
      scope: zone
      relation: user_viewer
    user_manager:
      scope: zone
      relation: user_manager
    group_viewer:
      scope: zone
      relation: group_viewer
    group_manager:
      scope: zone
      relation: group_manager
    permission_admin:
      scope: zone
      relation: permission_admin
  platform_resources:
    - {type: iam, id: organization}
    - {type: iam, id: capability}
    - {type: iam, id: resource_type}
    - {type: iam, id: resource}
    - {type: iam, id: resource_binding}
    - {type: iam, id: external_resource_binding}
    - {type: iam, id: role_template}
    - {type: iam, id: grant}
    - {type: iam_authz, id: global}
