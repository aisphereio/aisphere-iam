service:
  name: iam-service
  version: dev
  env: local

server:
  http:
    addr: 0.0.0.0:18080
    timeout_ns: 5000000000
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:18000
        - http://127.0.0.1:18000
        - http://localhost:3000
        - http://127.0.0.1:3000
      allowed_methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      allowed_headers: [Authorization, Content-Type, X-Request-ID, X-Trace-ID, Traceparent, Tracestate]
      exposed_headers: [X-Request-ID]
      allow_credentials: true
      max_age_ns: 3600000000000
  grpc:
    addr: 0.0.0.0:19080
    timeout_ns: 5000000000

log:
  service_name: iam-service
  env: local
  version: dev
  level: info
  format: console
  output: stdout
  add_source: true
  redact:
    enabled: true
    keys: [password, secret, token, access_key, secret_key, client_secret]
    value: "***"
  access_log:
    enabled: true
    skip_paths: [/healthz, /readyz, /metrics]
    slow_threshold: 1000000000
    request_id_header: X-Request-ID
    route_header: X-Route-Pattern
    log_user_agent: true

data:
  database:
    enabled: true
    config:
      driver: postgres
      dsn: "${POSTGRES_DSN}"
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_ns: 1800000000000
      conn_max_idle_time_ns: 300000000000
      query_timeout_ns: 5000000000
      slow_query_threshold_ns: 200000000
      audit_enabled: true
      metrics_enabled: true
  migration:
    enabled: true
    config:
      enabled: true
      engine: goose
      dir: migrations
      table: iam_schema_migrations
      mode: validate
      fail_on_pending: true
      allow_concurrent: false
  cache:
    enabled: false
    config:
      driver: redis
      addrs: [36.137.200.194:30085]
      password: "${REDIS_PASSWORD}"
      db: 0
      key_prefix: "iam:"
      dial_timeout_ns: 5000000000
      read_timeout_ns: 3000000000
      write_timeout_ns: 3000000000
      metrics_enabled: true
  object_store:
    enabled: false
    config:
      driver: minio
      endpoint: 127.0.0.1:9000
      use_ssl: false
      access_key: "${MINIO_ACCESS_KEY}"
      secret_key: "${MINIO_SECRET_KEY}"
      bucket: iam
      ensure_bucket: true
      presign_expiry_ns: 900000000000
      metrics_enabled: true

security:
  authn:
    enabled: true
    provider: casdoor
    casdoor:
      endpoint: http://36.137.200.194:30082
      organization_name: aisphere
      application_name: aisphere
      client_id: bbdcfc272e2b990cb923
      client_secret: "${CASDOOR_CLIENT_SECRET}"
      jwt_certificate_file: configs/casdoor.pub
      timeout: 10000000000
      metrics_enabled: true
      admin:
        enabled: false
  authz:
    enabled: true
    provider: spicedb
    dev_allow_all: false
    install_default_schema: true
    schema_path: configs/spicedb/aisphere.schema.zed
    spicedb:
      endpoint: 36.137.200.194:30084
      token: "${SPICEDB_TOKEN}"
      transport: grpc
      insecure: true
      timeout: 5000000000
      fully_consistent: true
      metrics_enabled: true
  access:
    skip_operations:
      - GetMe
      - CreateOrganization

control_plane:
  defaults:
    enabled: true
    path: configs/resource/defaults.yaml

gateway:
  route_registry:
    provider: etcd
    prefix: /aisphere/kernel/routes/dev
    endpoints: [36.137.200.194:30086]
    dial_timeout_ns: 5000000000
    request_timeout_ns: 5000000000

audit:
  enabled: true
  store: memory

metrics:
  enabled: true
  addr: 127.0.0.1:19180
  path: /metrics
  pprof: false
  runtime: true

dtm:
  enabled: false
  driver: dtm
  protocol: http
  server: http://127.0.0.1:36789/api/dtmsvr
  service_base_url: http://127.0.0.1:18080
  branch_prefix: /internal/dtm
  branch_secret: "${DTM_BRANCH_SECRET}"
  wait_result: true
  timeout_ns: 10000000000
  metrics_enabled: true
