version: v2

inputs:
  - directory: api

plugins:
  - local: protoc-gen-go
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-grpc
    out: api
    opt:
      - paths=source_relative

# Kernel transportx/http is the only runtime HTTP binding used by IAM.
  # Do not also generate grpc-gateway handlers for the same google.api.http
  # annotations, otherwise generated handler ownership becomes ambiguous.
  - local: protoc-gen-go-http
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-errors
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-authz
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-gateway
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-go-kernel
    out: api
    opt:
      - paths=source_relative

  - local: protoc-gen-openapiv2
    out: docs/openapi
    strategy: all
    opt:
      - logtostderr=true
      - allow_merge=true
      - merge_file_name=aisphere
      - use_go_templates=true
