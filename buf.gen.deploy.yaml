version: v2

inputs:
  - directory: api

plugins:
  - local: protoc-gen-go-deploy
    out: .
    strategy: all
    opt:
      - service=aisphere-iam
      - namespace=aisphere
      - backend_port=18080
      - parent_namespace=aisphere-system
      - public_gateway=aisphere-gateway
      - authenticated_gateway=aisphere-gateway
      - internal_gateway=aisphere-gateway
